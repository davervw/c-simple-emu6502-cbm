; tab5
[env:m5stack-tab5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
board = m5stack-tab5-p4
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags = 
    -D M5TAB5
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -I src

lib_deps = 
    M5Stack/M5Unified @ ^0.2.14
    M5Stack/M5GFX @ ^0.2.20
    BLE @ ^3.3.5
    FFat @ ^3.3.5
    SD @ ^3.3.5
    SD_MMC @ ^3.3.5
    SPI @ ^3.3.5
    Wire @ ^3.3.5
    FS @ ^3.3.5
    ; m5stack/M5Touch @ ^0.2.3
    ; m5stack/M5Audio @ ^0.2.3

; development only
monitor_port = COM11
upload_port = COM11

[env:esp32p4_pioarduino]
platform = https://github.com/pioarduino/platform-espressif32.git#54.03.20
platform_packages = 
    framework-arduinoespressif32 @ https://github.com
board = esp32-p4-evboard
framework = arduino
build_flags = 
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps = 
    https://github.com/M5Stack/M5Unified.git
    https://github.com/M5Stack/M5GFX.git